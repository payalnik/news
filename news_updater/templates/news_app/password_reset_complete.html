{% extends 'base.html' %}

{% block title %}Password Reset Complete - News Updater{% endblock %}

{% block content %}
<div class="auth-card-wrapper">
    <div class="auth-card">
        <div class="card">
            <div class="card-body p-4">
                <div class="auth-icon-circle">
                    <i class="bi bi-check-circle"></i>
                </div>
                <h2 class="text-center mb-3" style="font-size:1.35rem;">Password Reset Complete</h2>

                <div class="alert alert-success" role="alert">
                    <p class="mb-0">Your password has been set. You may go ahead and log in now.</p>
                </div>

                <div class="d-grid">
                    <a href="{% url 'login' %}" class="btn btn-primary">Log In</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
