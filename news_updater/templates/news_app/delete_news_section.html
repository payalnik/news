{% extends 'base.html' %}

{% block title %}Delete News Section - News Updater{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card delete-warning-card">
            <div class="card-body">
                <div class="delete-warning-icon">
                    <i class="bi bi-exclamation-triangle"></i>
                </div>
                <h2 class="text-center mb-3" style="font-size:1.25rem;">Delete News Section</h2>
                <p class="text-center" style="font-size:0.95rem;">Are you sure you want to delete the news section "<strong>{{ section.name }}</strong>"?</p>
                <p class="text-center text-danger" style="font-size:0.85rem;">This action cannot be undone.</p>

                <form method="post" novalidate>
                    {% csrf_token %}

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger">Delete Section</button>
                        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
